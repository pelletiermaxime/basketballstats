name: ci

on: push

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node }}
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Check (lint + format + typecheck)
        run: vp check

      - name: Test
        run: vp test --passWithNoTests
